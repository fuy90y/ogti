<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- title / description / 以下の空要素は app.js の hydrateLanding() が config.js から埋める -->
  <title></title>
  <meta name="description" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Rampart+One&family=RocknRoll+One&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">

    <!-- Landing (テキストは config.js から JS で注入) -->
    <section id="screen-landing" class="screen active">
      <header class="brand">
        <h1 class="brand-title"></h1>
        <p class="brand-sub"></p>
      </header>

      <div class="lead">
        <!-- <p> 段落と <ul class="axes-intro"> の <li> 群は JS が生成 -->
        <div class="axes-heading"><span></span></div>
        <ul class="axes-intro"></ul>
      </div>

      <div class="btn-row">
        <button id="btn-start" class="btn btn-primary" type="button"></button>
      </div>
    </section>

    <!-- Quiz -->
    <section id="screen-quiz" class="screen">
      <div class="progress">
        <span id="progress-text"></span>
        <div class="progress-track"><div id="progress-bar" class="progress-fill"></div></div>
      </div>

      <div class="question">
        <p id="question-prompt" class="question-prompt"></p>
        <div id="choices" class="choices"></div>
      </div>

      <div class="quiz-nav">
        <button id="btn-back" class="btn" type="button">← 前の設問</button>
      </div>
    </section>

    <!-- Result -->
    <section id="screen-result" class="screen">
      <div class="result-card" id="result-card">
        <div class="type-watermark" id="type-watermark" aria-hidden="true"></div>
        <div class="type-symbol" id="type-symbol" aria-hidden="true"></div>
        <p id="result-code" class="result-code"></p>
        <h2 id="result-name" class="result-name"></h2>
        <p id="result-tagline" class="result-tagline"></p>
        <p id="result-group" class="result-group"></p>
      </div>

      <div class="result-section">
        <h3>軸ごとの傾向</h3>
        <div id="result-axes"></div>
      </div>

      <div id="result-sections"></div>

      <div class="btn-row">
        <button id="btn-share" class="btn" type="button">結果をシェア</button>
        <button id="btn-restart" class="btn btn-primary" type="button">もう一度診断する</button>
      </div>
    </section>

    <footer class="site-foot">
      <span class="site-foot-brand"></span>
      <span class="site-foot-links"><a href="./terms.html">利用規約</a></span>
    </footer>
  </main>

  <div class="confetti-area" id="confetti" aria-hidden="true"></div>

  <!-- Start drumroll overlay (テキストは config.drumroll から JS で注入) -->
  <div class="start-overlay" id="start-overlay" aria-hidden="true">
    <div class="start-text">
      <div class="start-line start-line-1"></div>
      <div class="start-line start-line-2"></div>
    </div>
  </div>

  <!-- Share modal -->
  <div class="share-modal" id="share-modal" hidden>
    <div class="share-backdrop" id="share-backdrop"></div>
    <div class="share-card">
      <button class="share-close" id="share-close" type="button" aria-label="閉じる">×</button>
      <h3 class="share-title">シェア用画像</h3>
      <div class="share-preview">
        <img id="share-image" alt="診断結果画像" />
        <div class="share-spinner" id="share-spinner">生成中…</div>
      </div>
      <div class="share-actions">
        <button class="btn btn-primary" id="share-download" type="button">画像を保存</button>
      </div>
      <p class="share-hint">保存した画像をSNS等に添付できます</p>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
